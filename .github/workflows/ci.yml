name: CI
on:
    push: 
        branches: [advanced]
jobs:
    code-lint:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v6

            - name: Setup Node JS
              uses: actions/setup-node@v4
              with: 
                node-version: '20.x'
                cache: npm
                cache-dependency-path: ../frontend/package.json
            - name: install packages
              uses: npm install

            - name: Run Linter
              run: npm run lint
            
            - name: test
              run: npm run test

